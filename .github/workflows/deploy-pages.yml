name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: ['*']
    paths:
      - 'public/**'
      - '.github/workflows/deploy-pages.yml'
  pull_request:
    paths:
      - 'public/**'
      - '.github/workflows/deploy-pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Replace API_BASE placeholder
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::API_URL secret is not set"
            exit 1
          fi
          escaped_api_url=$(printf '%s' "$API_URL" | sed 's/[&|\\]/\\&/g')
          sed -i "s|__API_BASE__|${escaped_api_url}|g" public/index.html

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=status-page --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview deployed: ${{ steps.deploy.outputs.deployment-url }}`
            });
