<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - luischav.es</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%236b8e23'/></svg>">
  <style>
    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #d4d4d4;
      --text: #1a1a1a;
      --text-muted: #666666;
      --green: #6b8e23;
      --yellow: #daa520;
      --red: #cd5c5c;
      --gray: #d3d3d3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .logo-dot.has-issues { background: var(--yellow); }
    .logo-dot.has-outage { background: var(--red); }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 400;
    }

    .logo-text span { color: var(--text-muted); font-weight: 300; }

    .updated-text {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Status Banner */
    .status-banner {
      padding: 1.25rem 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .status-banner.all-good { background: var(--green); color: white; }
    .status-banner.has-issues { background: var(--yellow); color: white; }
    .status-banner.has-outage { background: var(--red); color: white; }
    .status-banner.unknown { background: #888; color: white; }

    .status-banner h2 { font-size: 1.25rem; font-weight: 500; }
    .status-banner p { font-size: 0.95rem; margin-top: 0.25rem; opacity: 0.95; }

    /* Service Card */
    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .service-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
    }

    .service-name a {
      color: inherit;
      text-decoration: none;
    }

    .service-name a:hover { text-decoration: underline; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.up { background: var(--green); }
    .status-dot.down { background: var(--red); }
    .status-dot.unknown { background: var(--gray); }

    .service-status {
      font-size: 0.9rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .service-status.operational { color: var(--green); }
    .service-status.degraded { color: var(--yellow); }
    .service-status.outage { color: var(--red); }
    .service-status.unknown { color: var(--text-muted); }

    .service-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* Uptime Bars */
    .uptime-bars {
      display: flex;
      gap: 2px;
      height: 34px;
      margin-bottom: 0.5rem;
    }

    .uptime-bar {
      flex: 1;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .uptime-bar:hover { opacity: 0.7; }
    .uptime-bar.good { background: var(--green); }
    .uptime-bar.degraded { background: var(--yellow); }
    .uptime-bar.outage { background: var(--red); }
    .uptime-bar.no-data { background: var(--gray); }

    .uptime-footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .uptime-footer .left { text-align: left; }
    .uptime-footer .center { text-align: center; }
    .uptime-footer .right { text-align: right; }

    /* Past Incidents */
    .section-title {
      font-size: 1.5rem;
      font-weight: 400;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .incident-day-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .incident-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
    }

    .incident-day-header:hover { background: #fafafa; }

    .incident-day-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .incident-day-date { font-weight: 600; font-size: 0.95rem; }

    .incident-day-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .severity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .severity-dot.minor { background: var(--yellow); }
    .severity-dot.major { background: var(--red); }

    .incident-day-toggle {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .incident-day-group.expanded .incident-day-toggle { transform: rotate(180deg); }

    .incident-day-body {
      display: none;
      border-top: 1px solid var(--border);
    }

    .incident-day-group.expanded .incident-day-body { display: block; }

    .incident-day-body-inner { padding: 0.75rem 1rem; }

    .incident-item {
      margin-bottom: 0.75rem;
      padding-left: 1rem;
      border-left: 3px solid var(--red);
    }

    .incident-item:last-child { margin-bottom: 0; }

    .incident-service { font-weight: 600; }
    .incident-status { color: var(--red); font-size: 0.9rem; }

    .no-incidents { color: var(--text-muted); font-style: italic; }

    .view-more-link {
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 0.75rem;
      padding: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
    }

    .view-more-link:hover { color: var(--text); }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #333;
      color: white;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 1000;
    }

    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer a { color: var(--text-muted); }

    .loading {
      color: var(--text-muted);
      padding: 2rem;
      text-align: center;
    }

    /* Tablet */
    @media (max-width: 768px) {
      .container { padding: 1.5rem 1rem; }
      .section-title { margin-top: 2rem; }
    }

    /* Phone */
    @media (max-width: 480px) {
      .container { padding: 1.25rem 1rem; }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .service-card { padding: 1rem; }
      .uptime-footer { font-size: 0.75rem; }

      .section-title {
        margin-top: 2rem;
        font-size: 1.25rem;
      }

      .incident-day-header { padding: 0.6rem 0.75rem; }
      .incident-day-date { font-size: 0.85rem; }
      .incident-day-meta { font-size: 0.75rem; }
      .incident-day-body-inner { padding: 0.6rem 0.75rem; }

      .status-banner { padding: 1rem; }
      .status-banner h2 { font-size: 1.1rem; }
    }

    @media (max-width: 360px) {
      .container { padding: 1rem 0.75rem; }
      .logo-text { font-size: 1.25rem; }
      .uptime-footer .center { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-dot" id="logo-dot"></div>
        <span class="logo-text">Status <span>luischav.es</span></span>
      </div>
      <div class="updated-text" id="updated">Loading...</div>
    </header>

    <div id="status-banner" class="status-banner unknown">
      <h2>Loading status...</h2>
    </div>

    <div id="services">
      <div class="loading">Loading service data...</div>
    </div>

    <h2 class="section-title">Past Incidents</h2>
    <div id="incidents">
      <div class="loading">Loading incidents...</div>
    </div>

    <footer>
      <p>Checks every 3 minutes. Uptime over the past 90 days.</p>
      <p style="margin-top: 0.5rem;">
        Built by <a href="https://home.luischav.es" target="_blank">@lucharo</a>
      </p>
    </footer>
  </div>

  <div id="tooltip" class="tooltip" style="display: none;"></div>

  <script>
    const API_BASE = '__API_BASE__';

    let statusData = null;
    let uptimeData = null;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatRelativeTime(isoString) {
      const d = new Date(isoString);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function getStatusInfo(isUp) {
      if (isUp === undefined || isUp === null) return { text: 'Unknown', class: 'unknown' };
      return isUp
        ? { text: 'Operational', class: 'operational' }
        : { text: 'Down', class: 'outage' };
    }

    function getBarClass(uptimePct) {
      if (uptimePct === null || uptimePct === undefined) return 'no-data';
      if (uptimePct >= 99) return 'good';
      if (uptimePct >= 95) return 'degraded';
      return 'outage';
    }

    function showTooltip(event, date, uptimePct) {
      const tooltip = document.getElementById('tooltip');
      const d = new Date(date);
      const formattedDate = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const statusText = uptimePct === null ? 'No data' : `${uptimePct.toFixed(1)}% uptime`;
      tooltip.textContent = `${formattedDate}: ${statusText}`;
      tooltip.style.display = 'block';
      const rect = event.target.getBoundingClientRect();
      tooltip.style.left = `${rect.left + rect.width / 2 - 60}px`;
      tooltip.style.top = `${rect.top - 35}px`;
    }

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    function renderStatusBanner(services) {
      const banner = document.getElementById('status-banner');
      const logoDot = document.getElementById('logo-dot');
      const downServices = services.filter(s => !s.isUp);

      if (downServices.length === 0) {
        banner.className = 'status-banner all-good';
        banner.innerHTML = '<h2>All Systems Operational</h2>';
        logoDot.className = 'logo-dot';
      } else {
        banner.className = 'status-banner has-outage';
        const names = downServices.map(s => s.name).join(', ');
        const count = downServices.length;
        banner.innerHTML = `
          <h2>${count} Service${count > 1 ? 's' : ''} Down</h2>
          <p>${esc(names)}</p>
        `;
        logoDot.className = 'logo-dot has-outage';
      }
    }

    function renderServices() {
      const container = document.getElementById('services');
      if (!statusData) return;

      const uptimeMap = {};
      if (uptimeData) {
        for (const line of uptimeData) {
          uptimeMap[line.id] = line;
        }
      }

      let html = '';

      for (const svc of statusData.services) {
        const status = getStatusInfo(svc.isUp);
        const dotClass = svc.isUp ? 'up' : 'down';
        const uptime = uptimeMap[svc.id];

        let barsHtml = '';
        let percent = 'No data';

        if (uptime && uptime.days) {
          barsHtml = uptime.days.map(day => {
            const barClass = getBarClass(day.uptimePct);
            return `<div class="uptime-bar ${barClass}"
              onmouseenter="showTooltip(event, '${day.date}', ${day.uptimePct})"
              onmouseleave="hideTooltip()"></div>`;
          }).join('');
          if (uptime.overallUptime !== null) {
            percent = `${uptime.overallUptime.toFixed(2)}% uptime`;
          }
        } else {
          for (let i = 0; i < 90; i++) {
            barsHtml += '<div class="uptime-bar no-data"></div>';
          }
        }

        const responseText = svc.isUp ? `${svc.responseTimeMs}ms` : `HTTP ${svc.statusCode || 'timeout'}`;

        html += `
          <div class="service-card">
            <div class="service-header">
              <span class="service-name">
                <span class="status-dot ${dotClass}"></span>
                <a href="${esc(svc.url)}" target="_blank">${esc(svc.name)}</a>
              </span>
              <span class="service-status ${status.class}">${status.text}</span>
            </div>
            <div class="service-meta">${responseText}</div>
            <div class="uptime-bars">${barsHtml}</div>
            <div class="uptime-footer">
              <span class="left">90 days ago</span>
              <span class="center">${percent}</span>
              <span class="right">Today</span>
            </div>
          </div>
        `;
      }

      container.innerHTML = html || '<div class="no-incidents">No service data available</div>';
    }

    // Incidents
    let allIncidentsByDate = {};
    let sortedIncidentDates = [];
    let visibleDayCount = 7;

    function localDateKey(date) {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function getRelativeDateLabel(dateKey) {
      const d = new Date(dateKey + 'T00:00:00');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      const dayStr = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
      if (d.getTime() === today.getTime()) return `Today, ${dayStr}`;
      if (d.getTime() === yesterday.getTime()) return `Yesterday, ${dayStr}`;
      return dayStr;
    }

    function toggleIncidentDay(groupId) {
      const group = document.getElementById(groupId);
      if (!group) return;
      group.classList.toggle('expanded');
      const header = group.querySelector('.incident-day-header');
      if (header) header.setAttribute('aria-expanded', group.classList.contains('expanded'));
    }

    function handleIncidentDayKeydown(event, groupId) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleIncidentDay(groupId);
      }
    }

    function showMoreIncidents() {
      visibleDayCount += 7;
      renderIncidentDays();
    }

    function renderIncidentDays() {
      const container = document.getElementById('incidents');
      if (sortedIncidentDates.length === 0) {
        container.innerHTML = '<div class="no-incidents">No incidents reported in the past 90 days.</div>';
        return;
      }

      const todayKey = localDateKey(new Date());
      const datesToShow = sortedIncidentDates.slice(0, visibleDayCount);
      let html = '';

      for (const dateKey of datesToShow) {
        const incidents = allIncidentsByDate[dateKey];
        const isToday = dateKey === todayKey;
        const expandedClass = isToday ? ' expanded' : '';
        const groupId = `incident-day-${dateKey}`;
        const dateLabel = getRelativeDateLabel(dateKey);
        const count = incidents.length;

        let itemsHtml = '';
        for (const inc of incidents) {
          itemsHtml += `
            <div class="incident-item">
              <div class="incident-service">${esc(inc.serviceName)}</div>
              <div class="incident-status">HTTP ${inc.statusCode || 'timeout'}</div>
            </div>
          `;
        }

        html += `
          <div class="incident-day-group${expandedClass}" id="${groupId}">
            <div class="incident-day-header" role="button" tabindex="0" aria-expanded="${isToday}" onclick="toggleIncidentDay('${groupId}')" onkeydown="handleIncidentDayKeydown(event, '${groupId}')">
              <div class="incident-day-label">
                <span class="incident-day-date">${dateLabel}</span>
                <div class="incident-day-meta">
                  <span class="severity-dot major"></span>
                  <span>${count} incident${count !== 1 ? 's' : ''}</span>
                </div>
              </div>
              <span class="incident-day-toggle">&#9660;</span>
            </div>
            <div class="incident-day-body">
              <div class="incident-day-body-inner">${itemsHtml}</div>
            </div>
          </div>
        `;
      }

      if (visibleDayCount < sortedIncidentDates.length) {
        html += `<button class="view-more-link" onclick="showMoreIncidents()">View older incidents</button>`;
      }

      container.innerHTML = html;
    }

    async function fetchStatus() {
      try {
        const res = await fetch(API_BASE + '/latest.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        statusData = await res.json();
        document.getElementById('updated').textContent = `Updated ${formatRelativeTime(statusData.updated)}`;
        renderStatusBanner(statusData.services);
        renderServices();
      } catch (e) {
        console.error('Failed to fetch status:', e);
        document.getElementById('updated').textContent = 'Failed to load';
        document.getElementById('status-banner').innerHTML = '<h2>Unable to load status</h2><p>Please refresh the page</p>';
        document.getElementById('status-banner').className = 'status-banner unknown';
      }
    }

    async function fetchUptime() {
      try {
        const res = await fetch(API_BASE + '/uptime?days=90');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        uptimeData = data.lines || [];
        renderServices();
      } catch (e) {
        console.error('Failed to fetch uptime:', e);
        renderServices();
      }
    }

    async function fetchIncidents() {
      try {
        const res = await fetch(API_BASE + '/incidents?days=90');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        allIncidentsByDate = {};
        for (const dayGroup of data.incidents || []) {
          const dateKey = localDateKey(dayGroup.date);
          if (!allIncidentsByDate[dateKey]) allIncidentsByDate[dateKey] = [];
          for (const inc of dayGroup.incidents || []) {
            allIncidentsByDate[dateKey].push(inc);
          }
        }
        sortedIncidentDates = Object.keys(allIncidentsByDate).sort((a, b) => b.localeCompare(a));
        visibleDayCount = 7;
        renderIncidentDays();
      } catch (e) {
        console.error('Failed to fetch incidents:', e);
        document.getElementById('incidents').innerHTML =
          '<div class="no-incidents">Failed to load incidents.</div>';
      }
    }

    fetchStatus();
    fetchUptime();
    fetchIncidents();
    setInterval(fetchStatus, 3 * 60 * 1000);
  </script>
</body>
</html>
